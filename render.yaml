# render.yaml — Render deployment configuration for the Socket.IO backend
#
# Deploys the multiplayer server only. The Next.js frontend is deployed
# separately on Vercel (it does not run on Render).
#
# Usage:
#   1. Go to https://dashboard.render.com
#   2. New → Blueprint → connect https://github.com/krishna31102004/monopoly
#   3. Render reads this file and creates the service automatically.
#   4. Set environment variables in the Render dashboard after creation
#      (see "Required env vars" below).
#
# Required env vars (set in Render dashboard, not here):
#   NODE_ENV=production
#   CLIENT_ORIGIN=https://your-app.vercel.app
#   (PORT is injected by Render automatically)

services:
  - type: web
    name: worldcities-monopoly-server
    runtime: node
    region: oregon          # change to the region closest to your users
    plan: free              # free tier is fine for private use; upgrade for always-on
    # npm ci --include=dev installs devDependencies (tsx, typescript) even when
    # NODE_ENV=production is set, so the TypeScript server can run on Render.
    buildCommand: npm ci --include=dev
    startCommand: npx tsx --tsconfig server/tsconfig.json server/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # CLIENT_ORIGIN must be set manually in the Render dashboard after the
      # Vercel frontend is deployed. Example:
      #   CLIENT_ORIGIN=https://your-app.vercel.app
      - key: CLIENT_ORIGIN
        sync: false         # marks it as "manual" — Render will prompt you to fill it in
